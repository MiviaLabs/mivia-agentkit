version: "1"
profile: standard
template_version: dev

project:
  name: mivia-agentkit

adapters:
  codex:
    enabled: true
    role: orchestrable
    effort: medium
  claude:
    enabled: false
    role: guidance
  copilot:
    enabled: true
    role: guidance
  antigravity:
    enabled: false
    role: guidance
  crush:
    enabled: false
    role: guidance
  zai:
    enabled: false
    role: orchestrable
  kimi:
    enabled: true
    role: orchestrable
    # Highspeed model keeps confirm/fix under campaign timeouts (max thinking thrash).
    model: kimi-code/kimi-for-coding-highspeed

routing:
  default_producer: codex
  default_reviewers:
    - codex
  consensus:
    mode: majority
    tie_breaker: strict
    min_reviewers: 1
  on_review_fail: iterate
  max_iterations: 2

commands:
  doctor-local: ./mivia-agent doctor --repo . --json
  adapters-local: ./mivia-agent adapters --repo . --json
  verify-agent-config: python3 scripts/verify_agent_config.py

protected_actions:
  - commit
  - push
  - pull_request
  - deploy
  - release
  - live_smoke

quality:
  required_verifiers:
    - python3 scripts/verify_agent_config.py
    - go test ./internal/adapter/... ./internal/cli/... ./internal/orchestrator/... ./internal/templates/... -count=1
    - go vet ./...
    - git diff --check

paths:
  allow:
    - .ai/**
    - .agents/**
    - .claude/**
    - .codex/**
    - cmd/**
    - docs/**
    - internal/**
    - scripts/**
    - templates/**
    - AGENTS.md
    - README.md
    - mivia-agent.yaml
  deny:
    - .ai/runs/**
    - .env
    - .env.*

governance:
  provider: noop
  audit_log: .ai/audit.jsonl

# Supervised audit-repair campaign (operator-enabled for live dual-CLI run).
# auditor=codex finds bugs; confirmer=kimi independently confirms; fixer=kimi codes repairs.
# (zai/crush blocked on dead Z.ai API keys as of 2026-07-18; kimi is the working independent CLI.)
# Launch: mivia-agent campaign run --repo . --campaign deep-bug-audit-repair --json
# Commit-capable mode requires independent auditor/confirmer and explicit allowed_paths.
loops:
  bug-audit-loop:
    bound: iterations
    max_iterations: 2
    steps:
      - id: audit
        producer: codex
  fix-loop:
    bound: iterations
    max_iterations: 1
    steps:
      - id: fix
        producer: kimi

campaigns:
  deep-bug-audit-repair:
    enabled: true
    audit_workflow: bug-audit-loop
    fix_workflow: fix-loop
    auditor: codex
    confirmer: kimi
    clean_pass_threshold: 2
    max_cycles: 6
    max_duration: 45m
    max_repair_attempts: 3
    no_progress_threshold: 2
    # Scoped commits: codex finds, kimi confirms, kimi codes, coordinator CommitScoped only.
    commit_enabled: true
    verifier_profile: go-test
    allowed_paths:
      - internal
      - cmd
      - scripts
      - docs
    commit_message_template: "fix(quality): campaign scoped repair"
    on_exhausted: fail

global:
  layer: ~/.agents
  merge: project_wins
