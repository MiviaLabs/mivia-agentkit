name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true

      - name: Build release binaries
        env:
          VERSION: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
        run: |
          set -euo pipefail
          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          mkdir -p dist
          targets=(
            "linux amd64"
            "darwin amd64"
            "darwin arm64"
            "windows amd64"
          )
          for target in "${targets[@]}"; do
            read -r goos goarch <<<"$target"
            ext=""
            if [ "$goos" = "windows" ]; then
              ext=".exe"
            fi
            output="dist/mivia-agent-${goos}-${goarch}${ext}"
            GOOS="$goos" GOARCH="$goarch" go build \
              -ldflags "-X github.com/MiviaLabs/mivia-agentkit/internal/version.Version=${VERSION} -X github.com/MiviaLabs/mivia-agentkit/internal/version.Commit=${COMMIT} -X github.com/MiviaLabs/mivia-agentkit/internal/version.Date=${DATE}" \
              -o "$output" ./cmd/mivia-agent
          done
          (cd dist && sha256sum mivia-agent-* > checksums.txt)

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/mivia-agent-*
            dist/checksums.txt
