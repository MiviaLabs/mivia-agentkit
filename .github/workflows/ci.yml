name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  go:
    name: Go (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -count=1

  fixture-smoke:
    name: Fixture Smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true

      - name: Fixture smoke
        run: go test ./test/fixture/... -count=1 -v

      - name: Adapters JSON smoke
        continue-on-error: true
        run: go run ./cmd/mivia-agent adapters --json
